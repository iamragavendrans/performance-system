<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Performance Management System</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Auth Container -->
  <div id="auth-container" class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>Performance System</h1>
        <p>Performance Management System</p>
      </div>
      <form id="login-form">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="login-email" class="form-input" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="login-password" class="form-input" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
      </form>
      <p class="text-center mt-4" style="color: var(--text-secondary); font-size: 14px;">
        Demo: admin@company.com / admin123
      </p>
    </div>
  </div>

  <!-- Main Application -->
  <div id="app" class="app-container hidden">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        Performance System
      </div>
      <ul class="nav-menu" id="nav-menu">
        <!-- Dynamic nav items based on role -->
      </ul>
      <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid var(--border);">
        <button class="btn btn-secondary" style="width: 100%;" onclick="logout()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
          Sign Out
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="page-header">
        <h1 class="page-title" id="page-title">Dashboard</h1>
        <div class="user-info">
          <div>
            <div class="user-name" id="user-name">Loading...</div>
            <div class="user-role" id="user-role">Loading...</div>
          </div>
          <div class="user-avatar" id="user-avatar">?</div>
        </div>
      </header>
      <div id="content-area">
        <!-- Dynamic content -->
      </div>
    </main>
  </div>

  <!-- Modal Template -->
  <div id="modal-overlay" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Modal</h2>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div id="modal-content"></div>
    </div>
  </div>

  <script>
    // State
    let currentUser = null;
    let currentView = 'dashboard';

    // Check for saved token on load
    const savedToken = localStorage.getItem('token');
    if (savedToken) {
      checkAuth(savedToken);
    }

    // Login form handler
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      
      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        
        if (!response.ok) throw new Error('Login failed');
        
        const data = await response.json();
        localStorage.setItem('token', data.token);
        currentUser = data.user;
        showApp();
      } catch (error) {
        alert('Login failed: ' + error.message);
      }
    });

    // Check authentication
    async function checkAuth(token) {
      try {
        const response = await fetch('/api/auth/me', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!response.ok) throw new Error('Invalid token');
        currentUser = await response.json();
        localStorage.setItem('token', token);
        showApp();
      } catch (error) {
        localStorage.removeItem('token');
      }
    }

    // Show main application
    function showApp() {
      document.getElementById('auth-container').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      updateUserInfo();
      renderNav();
      navigateTo('dashboard');
    }

    // Update user info
    function updateUserInfo() {
      document.getElementById('user-name').textContent = currentUser.name;
      document.getElementById('user-role').textContent = currentUser.role;
      document.getElementById('user-avatar').textContent = currentUser.name.charAt(0).toUpperCase();
    }

    // Render navigation based on role
    function renderNav() {
      const nav = document.getElementById('nav-menu');
      const items = [];
      
      // Common items
      items.push({ view: 'dashboard', label: 'Dashboard', icon: '📊' });
      
      if (currentUser.role === 'ADMIN') {
        items.push({ view: 'users', label: 'User Management', icon: '👥' });
        items.push({ view: 'goals', label: 'Goal Management', icon: '🎯' });
        items.push({ view: 'periods', label: 'Rating Periods', icon: '📅' });
        items.push({ view: 'groups', label: 'Groups', icon: '👨‍👩‍👧' });
        items.push({ view: 'team-report', label: 'Team Report', icon: '📈' });
      }
      
      if (currentUser.role === 'MANAGER') {
        items.push({ view: 'my-goals', label: 'My Goals', icon: '🎯' });
        items.push({ view: 'my-ratings', label: 'My Ratings', icon: '⭐' });
        items.push({ view: 'manager-team', label: 'My Team', icon: '👨‍👩‍👧' });
        items.push({ view: 'manager-goals', label: 'Goal Management', icon: '🎯' });
        items.push({ view: 'team-report', label: 'Team Report', icon: '📈' });
      }
      
      if (currentUser.role === 'EMPLOYEE') {
        items.push({ view: 'my-goals', label: 'My Goals', icon: '🎯' });
        items.push({ view: 'my-ratings', label: 'My Ratings', icon: '⭐' });
        items.push({ view: 'life-events', label: 'Life Events', icon: '❤️' });
      }
      
      nav.innerHTML = items.map(item => `
        <li class="nav-item">
          <a href="#" class="nav-link ${currentView === item.view ? 'active' : ''}" onclick="navigateTo('${item.view}')">
            <span>${item.icon}</span> ${item.label}
          </a>
        </li>
      `).join('');
    }

    // Navigation
    function navigateTo(view) {
      currentView = view;
      renderNav();
      document.querySelectorAll('.nav-link').forEach(link => {
        link.classList.toggle('active', link.textContent.trim().toLowerCase().includes(view.replace('-', ' ')));
      });
      
      const titles = {
        'dashboard': 'Dashboard',
        'users': 'User Management',
        'goals': 'Goal Management',
        'periods': 'Rating Periods',
        'groups': 'Groups',
        'team-report': 'Team Report',
        'manager-team': 'My Team',
        'manager-goals': 'Goal Management',
        'my-goals': 'My Goals',
        'my-ratings': 'My Ratings',
        'life-events': 'Life Events'
      };
      document.getElementById('page-title').textContent = titles[view] || 'Dashboard';
      renderContent(view);
    }

    // Render content based on view
    async function renderContent(view) {
      const content = document.getElementById('content-area');
      const token = localStorage.getItem('token');
      const headers = { 'Authorization': `Bearer ${token}` };
      
      switch(view) {
        case 'dashboard':
          content.innerHTML = await renderDashboard();
          break;
          
        // ADMIN VIEWS
        case 'users':
          if (currentUser.role !== 'ADMIN') return navigateTo('dashboard');
          const users = await fetch('/api/admin/users', { headers }).then(r => r.json());
          content.innerHTML = renderUsers(users);
          break;
          
        case 'goals':
          if (currentUser.role !== 'ADMIN') return navigateTo('dashboard');
          const goals = await fetch('/api/admin/goals', { headers }).then(r => r.json());
          content.innerHTML = renderGoals(goals);
          break;
          
        case 'periods':
          if (currentUser.role !== 'ADMIN') return navigateTo('dashboard');
          const periods = await fetch('/api/rating-periods', { headers }).then(r => r.json());
          content.innerHTML = renderPeriods(periods);
          break;
          
        case 'groups':
          if (currentUser.role !== 'ADMIN') return navigateTo('dashboard');
          content.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
          try {
            const groups = await fetch('/api/admin/groups', { headers }).then(r => r.json());
            const allGoals = await fetch('/api/admin/goals', { headers }).then(r => r.json());
            content.innerHTML = renderGroups(groups, allGoals);
          } catch (e) {
            content.innerHTML = '<div class="empty-state"><p>Error loading groups</p></div>';
          }
          break;
          
        case 'team-report':
          if (currentUser.role !== 'MANAGER' && currentUser.role !== 'ADMIN') return navigateTo('dashboard');
          content.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
          try {
            const managers = await fetch('/api/admin/managers', { headers }).then(r => r.json());
            const employees = await fetch('/api/admin/employees', { headers }).then(r => r.json());
            content.innerHTML = renderTeamReportFilters(managers, employees);
          } catch (e) {
            content.innerHTML = '<div class="empty-state"><p>Error loading filters</p></div>';
          }
          break;
          
        // MANAGER VIEWS
        case 'manager-team':
          if (currentUser.role !== 'MANAGER') return navigateTo('dashboard');
          const team = await fetch('/api/manager/team', { headers }).then(r => r.json());
          const teamGoals = await fetch('/api/manager/team-goals', { headers }).then(r => r.json());
          content.innerHTML = renderManagerTeam(team, teamGoals);
          break;
          
        case 'manager-goals':
          if (currentUser.role !== 'MANAGER') return navigateTo('dashboard');
          const teamMembers = await fetch('/api/manager/team', { headers }).then(r => r.json());
          const teamGoalsList = await fetch('/api/manager/team-goals', { headers }).then(r => r.json());
          const customGoals = await fetch('/api/manager/custom-goals', { headers }).then(r => r.json());
          content.innerHTML = renderManagerGoals(teamMembers, teamGoalsList, customGoals);
          break;
          
        // EMPLOYEE VIEWS
        case 'my-goals': {
          const isManagerGoals = currentUser.role === 'MANAGER';
          const goalsEndpoint = isManagerGoals ? '/api/manager/my-goals' : '/api/employee/goals';
          const myGoals = await fetch(goalsEndpoint, { headers }).then(r => r.json());
          content.innerHTML = renderMyGoals(myGoals, token);
          break;
        }

        case 'my-ratings': {
          const isManagerRatings = currentUser.role === 'MANAGER';
          const ratingsEndpoint = isManagerRatings ? '/api/manager/my-ratings' : '/api/employee/ratings';
          const ratings = await fetch(ratingsEndpoint, { headers }).then(r => r.json());
          content.innerHTML = renderMyRatings(ratings);
          break;
        }

        case 'life-events':
          const lifeEvents = await fetch('/api/employee/life-events', { headers }).then(r => r.json());
          const pendingApprovals = currentUser.role === 'MANAGER' ? await fetch('/api/manager/pending-life-events', { headers }).then(r => r.json()) : [];
          content.innerHTML = renderLifeEvents(lifeEvents, pendingApprovals);
          break;
      }
    }

    // ============ DASHBOARD FUNCTIONS ============

    async function renderDashboard() {
      const token = localStorage.getItem('token');
      const headers = { 'Authorization': `Bearer ${token}` };
      
      if (currentUser.role === 'ADMIN') {
        // Organization insights
        const stats = await fetch('/api/admin/stats', { headers }).then(r => r.json());
        return renderAdminDashboard(stats);
      } else if (currentUser.role === 'MANAGER') {
        // Team insights
        const stats = await fetch('/api/manager/stats', { headers }).then(r => r.json());
        return renderManagerDashboard(stats);
      } else {
        // Employee insights
        const stats = await fetch('/api/employee/stats', { headers }).then(r => r.json());
        return renderEmployeeDashboard(stats);
      }
    }

    function renderAdminDashboard(stats) {
      return `
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-value">${stats.totalEmployees || 0}</div>
            <div class="stat-label">Total Employees</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${stats.totalManagers || 0}</div>
            <div class="stat-label">Managers</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${stats.activeGoals || 0}</div>
            <div class="stat-label">Active Goals</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${stats.completedGoals || 0}</div>
            <div class="stat-label">Completed Goals</div>
          </div>
        </div>
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">Organization Insights</h3>
          </div>
          <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px;">
            <div style="padding: 15px; background: var(--background); border-radius: 8px;">
              <h4 style="margin-bottom: 10px;">📈 Goal Completion Rate</h4>
              <p style="font-size: 24px; font-weight: bold; color: var(--primary);">${stats.completionRate || 0}%</p>
              <p style="font-size: 13px; color: var(--text-secondary);">Across all employees</p>
            </div>
            <div style="padding: 15px; background: var(--background); border-radius: 8px;">
              <h4 style="margin-bottom: 10px;">🎯 Top Performing Department</h4>
              <p style="font-size: 18px; font-weight: bold; color: var(--success);">${stats.topDepartment || 'N/A'}</p>
              <p style="font-size: 13px; color: var(--text-secondary);">Highest completion rate</p>
            </div>
            <div style="padding: 15px; background: var(--background); border-radius: 8px;">
              <h4 style="margin-bottom: 10px;">⚠️ Needs Attention</h4>
              <p style="font-size: 24px; font-weight: bold; color: var(--warning);">${stats.needsAttention || 0}</p>
              <p style="font-size: 13px; color: var(--text-secondary);">Employees below 40%</p>
            </div>
            <div style="padding: 15px; background: var(--background); border-radius: 8px;">
              <h4 style="margin-bottom: 10px;">⭐ Active Rating Period</h4>
              <p style="font-size: 18px; font-weight: bold; color: var(--primary);">${stats.activePeriod || 'None'}</p>
              <p style="font-size: 13px; color: var(--text-secondary);">Currently in progress</p>
            </div>
          </div>
        </div>
      `;
    }

    function renderManagerDashboard(stats) {
      return `
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-value">${stats.teamMembers || 0}</div>
            <div class="stat-label">Team Members</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${stats.activeGoals || 0}</div>
            <div class="stat-label">Active Goals</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${stats.completedGoals || 0}</div>
            <div class="stat-label">Completed Goals</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${stats.pendingApprovals || 0}</div>
            <div class="stat-label">Pending Approvals</div>
          </div>
        </div>
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">Team Insights</h3>
          </div>
          <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px;">
            <div style="padding: 15px; background: var(--background); border-radius: 8px;">
              <h4 style="margin-bottom: 10px;">📈 Team Completion Rate</h4>
              <p style="font-size: 24px; font-weight: bold; color: var(--primary);">${stats.completionRate || 0}%</p>
              <p style="font-size: 13px; color: var(--text-secondary);">Average across team</p>
            </div>
            <div style="padding: 15px; background: var(--background); border-radius: 8px;">
              <h4 style="margin-bottom: 10px;">🎯 Goals On Track</h4>
              <p style="font-size: 24px; font-weight: bold; color: var(--success);">${stats.onTrack || 0}</p>
              <p style="font-size: 13px; color: var(--text-secondary);">70% or more complete</p>
            </div>
            <div style="padding: 15px; background: var(--background); border-radius: 8px;">
              <h4 style="margin-bottom: 10px;">⚠️ Needs Improvement</h4>
              <p style="font-size: 24px; font-weight: bold; color: var(--warning);">${stats.needsImprovement || 0}</p>
              <p style="font-size: 13px; color: var(--text-secondary);">Below 40% complete</p>
            </div>
            <div style="padding: 15px; background: var(--background); border-radius: 8px;">
              <h4 style="margin-bottom: 10px;">✅ Completed This Period</h4>
              <p style="font-size: 24px; font-weight: bold; color: var(--success);">${stats.completedThisPeriod || 0}</p>
              <p style="font-size: 13px; color: var(--text-secondary);">Goals marked complete</p>
            </div>
          </div>
        </div>
      `;
    }

    function renderEmployeeDashboard(stats) {
      return `
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-value">${stats.activeGoals || 0}</div>
            <div class="stat-label">Active Goals</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${stats.completedGoals || 0}</div>
            <div class="stat-label">Completed Goals</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${stats.avgCompletion || 0}%</div>
            <div class="stat-label">Avg. Completion</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${stats.pendingApprovals || 0}</div>
            <div class="stat-label">Pending Approvals</div>
          </div>
        </div>
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">My Performance Insights</h3>
          </div>
          <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px;">
            <div style="padding: 15px; background: var(--background); border-radius: 8px;">
              <h4 style="margin-bottom: 10px;">🎯 Focus Priority</h4>
              <p style="font-size: 16px; font-weight: bold; color: var(--primary);">${stats.focusPriority || 'N/A'}</p>
              <p style="font-size: 13px; color: var(--text-secondary);">Based on goal weightage</p>
            </div>
            <div style="padding: 15px; background: var(--background); border-radius: 8px;">
              <h4 style="margin-bottom: 10px;">⚠️ Needs Attention</h4>
              <p style="font-size: 16px; font-weight: bold; color: var(--warning);">${stats.needsAttention || 0} goals</p>
              <p style="font-size: 13px; color: var(--text-secondary);">Below 40% completion</p>
            </div>
            <div style="padding: 15px; background: var(--background); border-radius: 8px;">
              <h4 style="margin-bottom: 10px;">🌟 Going Well</h4>
              <p style="font-size: 16px; font-weight: bold; color: var(--success);">${stats.goingWell || 0} goals</p>
              <p style="font-size: 13px; color: var(--text-secondary);">70% or more complete</p>
            </div>
            <div style="padding: 15px; background: var(--background); border-radius: 8px;">
              <h4 style="margin-bottom: 10px;">📊 Last Rating</h4>
              <p style="font-size: 16px; font-weight: bold; color: var(--primary);">${stats.lastRating || 'N/A'}</p>
              <p style="font-size: 13px; color: var(--text-secondary);">From last period</p>
            </div>
          </div>
        </div>
      `;
    }

    // ============ ADMIN RENDER FUNCTIONS ============

    function renderUsers(users) {
      return `
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">All Users</h3>
            <button class="btn btn-primary btn-sm" onclick="showAddUserModal()">+ Add User</button>
          </div>
          <div class="table-container">
            <table class="table">
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Role</th>
                  <th>Manager</th>
                  <th>Department</th>
                  <th>Position</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                ${users.map(u => `
                  <tr>
                    <td>${u.name}</td>
                    <td>${u.email}</td>
                    <td><span class="badge badge-${u.role === 'ADMIN' ? 'danger' : u.role === 'MANAGER' ? 'warning' : 'info'}">${u.role}</span></td>
                    <td>${u.manager_name || '-'}</td>
                    <td>${u.department || '-'}</td>
                    <td>${u.position || '-'}</td>
                    <td>
                      <button class="btn btn-sm btn-secondary" onclick="showEditUserModal('${u.id}', '${u.name}', '${u.email}', '${u.role}', '${u.manager_id || ''}', '${u.department || ''}', '${u.position || ''}')">Edit</button>
                      ${u.id !== currentUser.id ? `<button class="btn btn-sm btn-danger" onclick="deleteUser('${u.id}')">Delete</button>` : ''}
                    </td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    function renderGoals(goals) {
      return `
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">Company Goals</h3>
            <button class="btn btn-primary btn-sm" onclick="showAddGoalModal()">+ Add Goal</button>
          </div>
          ${goals.length === 0 ? '<div class="empty-state"><p>No goals created yet</p></div>' : `
            <div class="table-container">
              <table class="table">
                <thead>
                  <tr>
                    <th>Title</th>
                    <th>Description</th>
                    <th>Success Criteria</th>
                    <th>Competencies</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody>
                  ${goals.map(g => `
                    <tr>
                      <td><strong>${g.title}</strong></td>
                      <td>${g.description || '-'}</td>
                      <td>${g.success_criteria || '-'}</td>
                      <td>${g.competencies || '-'}</td>
                      <td>
                        <button class="btn btn-sm btn-secondary" onclick="showEditGoalModal('${g.id}', '${g.title}', '${g.description || ''}', '${g.success_criteria || ''}', '${g.competencies || ''}')">Edit</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteGoal('${g.id}')">Delete</button>
                      </td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          `}
        </div>
      `;
    }

    function renderPeriods(periods) {
      return `
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">Rating Periods</h3>
            <button class="btn btn-primary btn-sm" onclick="showAddPeriodModal()">+ Add Period</button>
          </div>
          <div class="table-container">
            <table class="table">
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Start Date</th>
                  <th>End Date</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                ${periods.map(p => `
                  <tr>
                    <td><strong>${p.name}</strong></td>
                    <td>${p.start_date}</td>
                    <td>${p.end_date}</td>
                    <td><span class="badge ${p.is_active ? 'badge-success' : 'badge-info'}">${p.is_active ? 'Active' : 'Inactive'}</span></td>
                    <td>
                      <button class="btn btn-sm btn-secondary" onclick="showEditPeriodModal('${p.id}', '${p.name}', '${p.start_date}', '${p.end_date}', ${p.is_active})">Edit</button>

    async function loadTeamReport() {
      const token = localStorage.getItem('token');
      const managerId = document.getElementById('report-manager')?.value || '';
      const employeeId = document.getElementById('report-employee')?.value || '';
      const periodId = document.getElementById('report-period')?.value || '';
      
      const params = new URLSearchParams();
      if (managerId) params.append('managerId', managerId);
      if (employeeId) params.append('employeeId', employeeId);
      if (periodId) params.append('periodId', periodId);
      
      const content = document.getElementById('team-report-content');
      content.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
      
      try {
        const report = await fetch(`/api/reports/team?${params}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        }).then(r => r.json());
        
        content.innerHTML = renderTeamReportData(report);
      } catch (e) {
        content.innerHTML = '<div class="empty-state"><p>Error loading report</p></div>';
      }
    }

    function renderTeamReportData(report) {
      if (!report || !report.summary) return '<div class="empty-state"><p>No data available for selected filters</p></div>';
      
      return `
        <div style="background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%); padding: 20px; border-radius: 12px; margin-bottom: 20px;">
          <h4 style="margin-bottom: 10px;">📊 Organization Summary</h4>
          <p>${report.summary.employeeCount || 0} employees across ${report.summary.managerCount || 0} managers</p>
          <p>Average completion: ${report.summary.avgCompletion || 0}%</p>
        </div>
        
        ${report.byManager && report.byManager.length > 0 ? `
          <h4 style="margin-bottom: 15px;">By Manager</h4>
          ${report.byManager.map(m => `
            <div style="margin-bottom: 20px; padding: 15px; background: var(--background); border-radius: 8px; cursor: pointer;" onclick="toggleSection('manager-${m.id}')">
              <div class="flex justify-between items-center">
                <strong>${m.name} (${m.employeeCount} employees)</strong>
                <span class="badge ${m.avgCompletion >= 70 ? 'badge-success' : m.avgCompletion >= 40 ? 'badge-warning' : 'badge-danger'}">

              <div id="manager-${m.id}" style="display: none; margin-top: 15px;">
                ${m.employees.map(e => `
                  <div style="padding: 10px; margin-top: 10px; border-left: 3px solid var(--primary);">

    function renderMyGoals(goals, token) {
      // Sort: needs attention first (below 40%), then going well (70%+), then completed
      const needsAttention = goals.filter(g => (g.latest_completion || 0) < 40 && (g.latest_completion || 0) < 100);
      const goingWell = goals.filter(g => (g.latest_completion || 0) >= 40 && (g.latest_completion || 0) < 100 && (g.latest_completion || 0) < 70);
      const onTrack = goals.filter(g => (g.latest_completion || 0) >= 70 && (g.latest_completion || 0) < 100);
      const completed = goals.filter(g => (g.latest_completion || 0) >= 100 || g.status === 'COMPLETED');
      
      return `
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">My Goals</h3>
          </div>
          
          ${goals.length === 0 ? '<div class="empty-state"><p>No goals assigned yet</p></div>' : `
            <!-- Needs Attention Section -->
            ${needsAttention.length > 0 ? `
              <div style="margin-bottom: 25px;">
                <h4 style="margin-bottom: 15px; color: var(--warning);">⚠️ Needs Attention (${needsAttention.length})</h4>
                ${needsAttention.map(g => renderGoalCard(g, token)).join('')}
              </div>
            ` : ''}
            
            <!-- On Track Section -->
            ${onTrack.length > 0 ? `
              <div style="margin-bottom: 25px;">
                <h4 style="margin-bottom: 15px; color: var(--success);">🌟 On Track (${onTrack.length})</h4>
                ${onTrack.map(g => renderGoalCard(g, token)).join('')}
              </div>
            ` : ''}
            
            <!-- Going Well Section -->
            ${goingWell.length > 0 ? `
              <div style="margin-bottom: 25px;">
                <h4 style="margin-bottom: 15px; color: var(--primary);">📈 Going Well (${goingWell.length})</h4>
                ${goingWell.map(g => renderGoalCard(g, token)).join('')}
              </div>
            ` : ''}
            
            <!-- Completed Section -->
            ${completed.length > 0 ? `
              <div style="margin-bottom: 25px;">
                <h4 style="margin-bottom: 15px; color: var(--text-secondary);">✅ Completed (${completed.length})</h4>
                ${completed.map(g => renderGoalCard(g, token)).join('')}
              </div>
            ` : ''}
          `}
        </div>
      `;
    }

    function renderGoalCard(g, token) {
      const completion = g.latest_completion || 0;
      const statusClass = completion >= 70 ? 'success' : completion >= 40 ? 'warning' : 'danger';
      const isCustom = g.is_custom === 1 || g.is_custom === true;
      const needsWeightageApproval = g.weightage_pending_approval === 1 || g.weightage_pending_approval === true;
      
      return `
        <div style="margin-bottom: 20px; padding: 20px; background: var(--background); border-radius: 12px; border-left: 4px solid var(--${statusClass});">
          <div class="flex justify-between items-center mb-2">
            <div>
              <h4>
                ${g.customized_title || g.title}
                ${isCustom ? '<span class="badge badge-info" style="margin-left: 8px;">Custom</span>' : ''}
                ${needsWeightageApproval ? '<span class="badge badge-warning" style="margin-left: 8px;">Pending Approval</span>' : ''}
              </h4>
              <p style="color: var(--text-secondary); font-size: 14px; margin-top: 5px;">${g.description || g.customized_criteria || ''}</p>
              ${g.weightage ? `<p style="font-size: 13px; margin-top: 5px;"><strong>Weightage:</strong> ${g.weightage}%</p>` : ''}
            </div>
            <span class="badge badge-${statusClass}">${completion}%</span>
          </div>
          
          <div class="progress-bar mb-3">
            <div class="progress-fill ${statusClass}" style="width: ${Math.min(completion, 100)}%"></div>
          </div>
          
          <div style="display: flex; gap: 10px; flex-wrap: wrap;">
            <button class="btn btn-primary btn-sm" onclick="showUpdateProgressModal('${g.id}', '${g.customized_title || g.title}')">
              Update Progress
            </button>
            <button class="btn btn-secondary btn-sm" onclick="showUploadFileModal('${g.id}', '${g.customized_title || g.title}')">
              📎 Upload File
            </button>
            ${g.files && g.files.length > 0 ? `
              <button class="btn btn-secondary btn-sm" onclick="showViewFilesModal('${g.id}', '${g.customized_title || g.title}')">
                View Files (${g.files.length})
              </button>
            ` : ''}
            <button class="btn btn-secondary btn-sm" onclick="showUpdateWeightageModal('${g.id}', '${g.customized_title || g.title}', ${g.weightage || 0})">
              Update Weightage
            </button>
          </div>
          
          ${g.manager_feedback ? `
            <div style="margin-top: 15px; padding: 12px; background: rgba(0,0,0,0.05); border-radius: 8px;">
              <strong>Manager Feedback:</strong>
              <p style="font-size: 13px; margin-top: 5px;">${g.manager_feedback}</p>
            </div>
          ` : ''}
        </div>
      `;
    }

          </div>
          <p style="color: var(--text-secondary); margin-bottom: 15px;">
            ${!isManager ? 'Add life events that may have affected your performance (e.g., dependent\'s death, medical leave, sabbatical). Manager approval required.' : 'Life events submitted by your team members.'}
          </p>
          ${lifeEvents.length === 0 ? '<div class="empty-state"><p>No life events recorded</p></div>' : `
            ${lifeEvents.map(le => `
              <div style="margin-bottom: 15px; padding: 15px; background: var(--background); border-radius: 8px; border-left: 4px solid ${le.status === 'APPROVED' ? 'var(--success)' : le.status === 'PENDING' ? 'var(--warning)' : 'var(--danger)'};">
                <div class="flex justify-between items-center">
                  <div>
                    <h4>${formatEventType(le.event_type)}</h4>
                    <p style="color: var(--text-secondary); font-size: 14px;">
                      ${le.start_date} to ${le.end_date}
                    </p>
                    <p style="font-size: 13px; margin-top: 5px;">${le.reason || ''}</p>
                    ${le.adjustment_percentage ? `<p style="font-size: 13px; color: var(--primary);">Rating Adjustment: ${le.adjustment_percentage}%</p>` : ''}
                  </div>
                  <div>
                    <span class="badge badge-${le.status === 'APPROVED' ? 'success' : le.status === 'PENDING' ? 'warning' : 'danger'}">${le.status}</span>
                    ${!isManager && le.status === 'PENDING' ? `
                      <button class="btn btn-sm btn-secondary" style="margin-left: 10px;" onclick="showEditLifeEventModal('${le.id}', '${le.event_type}', '${le.start_date}', '${le.end_date}', '${le.reason || ''}')">Edit</button>
                      <button class="btn btn-sm btn-danger" onclick="deleteLifeEvent('${le.id}')">Delete</button>
                    ` : ''}
                  </div>
                </div>
              </div>
            `).join('')}
          `}
        </div>
      `;
      
      return html;
    }

          <button type="submit" class="btn btn-primary" style="width: 100%;">Upload</button>
        </form>
      `;
      document.getElementById('modal-overlay').classList.add('active');
    }

    async function uploadFile(e, goalId) {
      e.preventDefault();
      const form = e.target;
      const fileInput = form.file;
      const description = form.description.value;

      if (!fileInput.files.length) {
        alert('Please select a file');
        return;
      }

      const fileName = fileInput.files[0].name;

      const token = localStorage.getItem('token');
      const response = await fetch(`/api/employee/goals/${goalId}/files`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ file_name: fileName, description })
      });

      if (response.ok) {
        closeModal();
        alert('File reference saved successfully!');
        navigateTo('my-goals');
      } else {
        const err = await response.json();
        alert('Failed to save file: ' + err.error);
      }
    }

    async function showViewFilesModal(goalId, goalTitle) {
      const token = localStorage.getItem('token');
      const files = await fetch(`/api/employee/goals/${goalId}/files`, {
        headers: { 'Authorization': `Bearer ${token}` }
      }).then(r => r.json()).catch(() => []);

      document.getElementById('modal-title').textContent = `Files - ${goalTitle}`;
      document.getElementById('modal-content').innerHTML = `
        ${files.length === 0 ? '<p style="color: var(--text-secondary);">No files uploaded yet.</p>' : `
          <div style="max-height: 300px; overflow-y: auto;">
            ${files.map(f => `
              <div style="padding: 12px; margin-bottom: 8px; background: var(--background); border-radius: 8px; display: flex; justify-content: space-between; align-items: center;">
                <div>
                  <strong>${f.file_name}</strong>
                  ${f.description ? `<p style="font-size: 13px; color: var(--text-secondary); margin-top: 4px;">${f.description}</p>` : ''}
                  <p style="font-size: 12px; color: var(--text-secondary);">Uploaded: ${new Date(f.uploaded_at).toLocaleDateString()}</p>
                </div>
              </div>
            `).join('')}
          </div>
        `}
      `;
      document.getElementById('modal-overlay').classList.add('active');
    }

    // Weightage Update Modal
    function showUpdateWeightageModal(goalId, goalTitle, currentWeightage) {
      document.getElementById('modal-title').textContent = `Update Weightage - ${goalTitle}`;
      document.getElementById('modal-content').innerHTML = `
        <form onsubmit="updateWeightage(event, '${goalId}')">
          <p style="margin-bottom: 15px; color: var(--text-secondary);">
            Weightage determines the importance of this goal relative to others. 
            Updates require manager approval.
          </p>
          <div class="form-group">
            <label class="form-label">Weightage (%)</label>
            <input type="number" name="weightage" class="form-input" min="0" max="100" value="${currentWeightage}" required>
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%;">Submit for Approval</button>
        </form>
      `;
      document.getElementById('modal-overlay').classList.add('active');
    }

    async function updateWeightage(e, goalId) {
      e.preventDefault();
      const form = e.target;
      const data = {
        weightage: parseInt(form.weightage.value)
      };
      
      const token = localStorage.getItem('token');
      const response = await fetch(`/api/employee/goals/${goalId}/weightage`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify(data)
      });
      
      if (response.ok) {
        closeModal();
        alert('Weightage update submitted for manager approval!');
        navigateTo('my-goals');
      } else {
        const err = await response.json();
        alert('Failed to update weightage: ' + err.error);
      }
    }

    // Life Events Modal
    function showAddLifeEventModal() {

    function showEditLifeEventModal(id, eventType, startDate, endDate, reason) {
      document.getElementById('modal-title').textContent = 'Edit Life Event';
      document.getElementById('modal-content').innerHTML = `
        <form onsubmit="updateLifeEvent(event, '${id}')">
          <div class="form-group">
            <label class="form-label">Event Type</label>
            <select name="event_type" class="form-select" required>
              <option value="SICK_LEAVE" ${eventType === 'SICK_LEAVE' ? 'selected' : ''}>Medical Leave</option>
              <option value="MATERNITY_LEAVE" ${eventType === 'MATERNITY_LEAVE' ? 'selected' : ''}>Maternity Leave</option>
              <option value="PATERNITY_LEAVE" ${eventType === 'PATERNITY_LEAVE' ? 'selected' : ''}>Paternity Leave</option>
              <option value="BEREAVEMENT" ${eventType === 'BEREAVEMENT' ? 'selected' : ''}>Bereavement</option>
              <option value="SABBATICAL" ${eventType === 'SABBATICAL' ? 'selected' : ''}>Sabbatical</option>
              <option value="FAMILY_EMERGENCY" ${eventType === 'FAMILY_EMERGENCY' ? 'selected' : ''}>Family Emergency</option>

    async function addLifeEvent(e) {
      e.preventDefault();
      const form = e.target;
      const data = {
        event_type: form.event_type.value,
        start_date: form.start_date.value,
        end_date: form.end_date.value,
        reason: form.reason.value
      };
      
      const token = localStorage.getItem('token');
      const response = await fetch('/api/employee/life-events', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify(data)
      });
      
      if (response.ok) {
        closeModal();
        alert('Life event submitted for manager approval!');
        navigateTo('life-events');
      } else {
        const err = await response.json();
        alert('Failed to add life event: ' + err.error);
      }
    }

    async function updateLifeEvent(e, id) {
      e.preventDefault();
      const form = e.target;
      const data = {
        event_type: form.event_type.value,
        start_date: form.start_date.value,
        end_date: form.end_date.value,
        reason: form.reason.value
      };
      
      const token = localStorage.getItem('token');
      const response = await fetch(`/api/employee/life-events/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify(data)
      });
      
      if (response.ok) {
        closeModal();
        navigateTo('life-events');
      } else {
        const err = await response.json();
        alert('Failed to update life event: ' + err.error);
      }
    }

    async function deleteLifeEvent(id) {
      if (!confirm('Are you sure you want to delete this life event?')) return;
      
      const token = localStorage.getItem('token');
      const response = await fetch(`/api/employee/life-events/${id}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${token}` }
      });
      
      if (response.ok) {
        navigateTo('life-events');
      } else {
        const err = await response.json();
        alert('Failed to delete life event: ' + err.error);
      }
    }

    async function approveLifeEvent(id) {
      const token = localStorage.getItem('token');
      const response = await fetch(`/api/manager/life-events/${id}/approve`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` }
      });
      
      if (response.ok) {
        alert('Life event approved!');
        navigateTo('life-events');
      } else {
        const err = await response.json();
        alert('Failed to approve: ' + err.error);
      }
    }

    async function rejectLifeEvent(id) {
      const reason = prompt('Please provide a reason for rejection:');
      if (!reason) return;
      
      const token = localStorage.getItem('token');
      const response = await fetch(`/api/manager/life-events/${id}/reject`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ reason })
      });
      
      if (response.ok) {
        alert('Life event rejected!');
        navigateTo('life-events');
      } else {
        const err = await response.json();
        alert('Failed to reject: ' + err.error);
      }
    }

    // Manager Team Modals
    function showAddTeamMemberModal() {
      alert('To add team members, please contact Admin to create the user and assign them to your management.');
    }

    async function removeTeamMember(id) {
      if (!confirm('Are you sure you want to remove this team member from your team?')) return;
      
      const token = localStorage.getItem('token');
      const response = await fetch(`/api/manager/team/${id}/unassign`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` }
      });
      
      if (response.ok) {
        navigateTo('manager-team');
      } else {
        const err = await response.json();
        alert('Failed to remove team member: ' + err.error);
      }
    }

    async function showAssignGoalModal(employeeId, employeeName) {
      const token = localStorage.getItem('token');
      const goals = await fetch('/api/admin/goals', { headers: { 'Authorization': `Bearer ${token}` } }).then(r => r.json()).catch(() => []);

      document.getElementById('modal-title').textContent = `Assign Goal to ${employeeName}`;
      document.getElementById('modal-content').innerHTML = `
        <form onsubmit="assignGoalToEmployee(event, '${employeeId}')">
          <div class="form-group">
            <label class="form-label">Select Goal</label>
            <select name="goalId" class="form-select" required>
              <option value="">Choose a goal...</option>
              ${goals.map(g => `<option value="${g.id}">${g.title}</option>`).join('')}
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Customized Title (Optional)</label>
            <input type="text" name="customizedTitle" class="form-input" placeholder="Override goal title for this employee">
          </div>
          <div class="form-group">
            <label class="form-label">Customized Criteria (Optional)</label>
            <textarea name="customizedCriteria" class="form-textarea" placeholder="Override success criteria"></textarea>
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%;">Assign Goal</button>
        </form>
      `;
      document.getElementById('modal-overlay').classList.add('active');
    }

    async function assignGoalToEmployee(e, employeeId) {
      e.preventDefault();
      const form = e.target;
      const data = {
        employeeId,
        goalId: form.goalId.value,
        customizedTitle: form.customizedTitle.value || null,
        customizedCriteria: form.customizedCriteria.value || null
      };

      const token = localStorage.getItem('token');
      const response = await fetch('/api/manager/assign-goal', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify(data)
      });

      if (response.ok) {
        closeModal();
        alert('Goal assigned successfully!');
        navigateTo('manager-team');
      } else {
        const err = await response.json();
        alert('Failed to assign goal: ' + err.error);
      }
    }

      document.getElementById('modal-title').textContent = `Link to Project - ${employeeName}`;

        </form>
      `;
      document.getElementById('modal-overlay').classList.add('active');
    }

    async function linkProject(e, employeeId) {
      e.preventDefault();
      alert('Project linking request submitted. Admin approval required.');
      closeModal();
    }

    // Custom Goal Modals
    function showAddCustomGoalModal() {

        <form onsubmit="addCustomGoal(event)">

      const token = localStorage.getItem('token');

        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },

    async function deleteCustomGoal(id) {
      if (!confirm('Are you sure you want to delete this custom goal?')) return;
      
      const token = localStorage.getItem('token');
      const response = await fetch(`/api/manager/custom-goals/${id}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${token}` }
      });
      
      if (response.ok) {
        navigateTo('manager-goals');
      } else {
        const err = await response.json();
        alert('Failed to delete custom goal: ' + err.error);
      }
    }

    function showRemoveCustomGoalModal(goalId, goalTitle) {
      if (!confirm(`Remove goal "${goalTitle}" from all team members?`)) return;
      
      // This would call an API to remove the goal assignment
      alert('Goal removed from team members.');
    }

    function formatEventType(type) {
      const map = {
        'SICK_LEAVE': 'Medical Leave',
        'MATERNITY_LEAVE': 'Maternity Leave',
        'PATERNITY_LEAVE': 'Paternity Leave',
        'BEREAVEMENT': 'Bereavement',
        'SABBATICAL': 'Sabbatical',
        'FAMILY_EMERGENCY': 'Family Emergency',
        'PERSONAL_EMERGENCY': 'Personal Emergency',
        'OTHER': 'Other'
      };
      return map[type] || type;
    }

    function toggleGoalDetails() {
      document.querySelectorAll('.goal-header').forEach(th => {
        th.style.writingMode = th.style.writingMode === 'vertical-rl' ? 'horizontal-tb' : 'vertical-rl';
      });
    }

    function logout() {
      localStorage.removeItem('token');
      currentUser = null;
      document.getElementById('app').classList.add('hidden');
      document.getElementById('auth-container').classList.remove('hidden');
    }
  </script>
