<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Performance Management System</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <!-- Auth Container -->
  <div id="auth-container" class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>Performance System</h1>
        <p>Performance Management System</p>
      </div>
      <form id="login-form">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="login-email" class="form-input" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="login-password" class="form-input" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
      </form>
      <p class="text-center mt-4" style="color: var(--text-secondary); font-size: 14px;">
        Demo: admin@company.com / admin123
      </p>
    </div>
  </div>

  <!-- Mobile Toggle Button -->
  <button class="mobile-toggle" onclick="toggleSidebar()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M3 12h18M3 6h18M3 18h18"/>
    </svg>
  </button>

  <!-- Sidebar Backdrop (Mobile) -->
  <div class="sidebar-backdrop" onclick="toggleSidebar()"></div>

  <!-- Main Application -->
  <div id="app" class="app-container hidden">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        Performance System
      </div>
      <ul class="nav-menu" id="nav-menu">
        <!-- Dynamic nav items based on role -->
      </ul>
      <div style="margin-top: auto; padding-top: 16px; border-top: 1px solid var(--border);">
        <button class="btn btn-secondary" style="width: 100%;" onclick="logout()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
          Sign Out
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="page-header">
        <h1 class="page-title" id="page-title">Dashboard</h1>
        <div class="user-info">
          <div>
            <div class="user-name" id="user-name">Loading...</div>
            <div class="user-role" id="user-role">Loading...</div>
          </div>
          <div class="user-avatar" id="user-avatar">?</div>
        </div>
      </header>
      <div id="content-area">
        <!-- Dynamic content -->
      </div>
    </main>
  </div>

  <!-- Modal Template -->
  <div id="modal-overlay" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Modal</h2>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div id="modal-content"></div>
    </div>
  </div>

  <script>
    // State
    let currentUser = null;
    let currentView = 'dashboard';

    // Utility: escape HTML to prevent XSS in template literals
    function escapeHtml(str) {
      if (str == null) return '';
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
    }

    // Check for saved token on load
    const savedToken = localStorage.getItem('token');
    if (savedToken) {
      checkAuth(savedToken);
    }

    // Login form handler
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      
      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        
        if (!response.ok) throw new Error('Login failed');
        
        const data = await response.json();
        localStorage.setItem('token', data.token);
        currentUser = data.user;
        showApp();
      } catch (error) {
        alert('Login failed: ' + error.message);
      }
    });

    // Check authentication
    async function checkAuth(token) {
      try {
        const response = await fetch('/api/auth/me', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!response.ok) throw new Error('Invalid token');
        currentUser = await response.json();
        localStorage.setItem('token', token);
        showApp();
      } catch (error) {
        localStorage.removeItem('token');
      }
    }

    // Show main application
    function showApp() {
      document.getElementById('auth-container').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      updateUserInfo();
      renderNav();
      navigateTo('dashboard');
    }

    // Update user info
    function updateUserInfo() {
      document.getElementById('user-name').textContent = currentUser.name;
      document.getElementById('user-role').textContent = currentUser.role;
      document.getElementById('user-avatar').textContent = currentUser.name.charAt(0).toUpperCase();
    }

    // Render navigation based on role
    function renderNav() {
      const nav = document.getElementById('nav-menu');
      const items = [];
      
      // SVG icon helper
      const icons = {
        dashboard: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>',
        users: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>',
        goals: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>',
        periods: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
        groups: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>',
        team: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>',
        report: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>',
        'my-ratings': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>',
        'life-events': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>',
      };
      
      // Common items
      items.push({ view: 'dashboard', label: 'Dashboard', icon: icons.dashboard });
      
      if (currentUser.role === 'ADMIN') {
        items.push({ view: 'users', label: 'User Management', icon: icons.users });
        items.push({ view: 'goals', label: 'Goal Management', icon: icons.goals });
        items.push({ view: 'periods', label: 'Rating Periods', icon: icons.periods });
        items.push({ view: 'groups', label: 'Groups', icon: icons.groups });
        items.push({ view: 'team-report', label: 'Team Report', icon: icons.report });
      }
      
      if (currentUser.role === 'MANAGER') {
        items.push({ view: 'my-goals', label: 'My Goals', icon: icons.goals });
        items.push({ view: 'my-ratings', label: 'My Ratings', icon: icons['my-ratings'] });
        items.push({ view: 'manager-team', label: 'My Team', icon: icons.team });
        items.push({ view: 'manager-goals', label: 'Goal Management', icon: icons.goals });
        items.push({ view: 'team-report', label: 'Team Report', icon: icons.report });
      }
      
      if (currentUser.role === 'EMPLOYEE') {
        items.push({ view: 'my-goals', label: 'My Goals', icon: icons.goals });
        items.push({ view: 'my-ratings', label: 'My Ratings', icon: icons['my-ratings'] });
        items.push({ view: 'life-events', label: 'Life Events', icon: icons['life-events'] });
      }
      
      nav.innerHTML = items.map(item => `
        <li class="nav-item">
          <a href="#" class="nav-link ${currentView === item.view ? 'active' : ''}" onclick="navigateTo('${item.view}')">
            ${item.icon}
            <span>${item.label}</span>
          </a>
        </li>
      `).join('');
    }

    // Navigation
    function navigateTo(view) {
      currentView = view;
      renderNav();
      document.querySelectorAll('.nav-link').forEach(link => {
        link.classList.toggle('active', link.textContent.trim().toLowerCase().includes(view.replace('-', ' ')));
      });
      
      const titles = {
        'dashboard': 'Dashboard',
        'users': 'User Management',
        'goals': 'Goal Management',
        'periods': 'Rating Periods',
        'groups': 'Groups',
        'team-report': 'Team Report',
        'manager-team': 'My Team',
        'manager-goals': 'Goal Management',
        'my-goals': 'My Goals',
        'my-ratings': 'My Ratings',
        'life-events': 'Life Events'
      };
      document.getElementById('page-title').textContent = titles[view] || 'Dashboard';
      renderContent(view);
      
      // Close mobile sidebar when navigating
      if (window.innerWidth <= 768) {
        closeSidebar();
      }
    }

    // Mobile sidebar toggle
    function toggleSidebar() {
      document.querySelector('.sidebar').classList.toggle('open');
      document.querySelector('.sidebar-backdrop').classList.toggle('active');
    }

    function closeSidebar() {
      document.querySelector('.sidebar').classList.remove('open');
      document.querySelector('.sidebar-backdrop').classList.remove('active');
    }

    // Render content based on view
    async function renderContent(view) {
      const content = document.getElementById('content-area');
      const token = localStorage.getItem('token');
      const headers = { 'Authorization': `Bearer ${token}` };
      
      switch(view) {
        case 'dashboard':
          content.innerHTML = await renderDashboard();
          break;
          
        // ADMIN VIEWS
        case 'users':
          if (currentUser.role !== 'ADMIN') return navigateTo('dashboard');
          const users = await fetch('/api/admin/users', { headers }).then(r => r.json());
          content.innerHTML = renderUsers(users);
          break;
          
        case 'goals':
          if (currentUser.role !== 'ADMIN') return navigateTo('dashboard');
          const goals = await fetch('/api/admin/goals', { headers }).then(r => r.json());
          content.innerHTML = renderGoals(goals);
          break;
          
        case 'periods':
          if (currentUser.role !== 'ADMIN') return navigateTo('dashboard');
          const periods = await fetch('/api/rating-periods', { headers }).then(r => r.json());
          content.innerHTML = renderPeriods(periods);
          break;
          
        case 'groups':
          if (currentUser.role !== 'ADMIN') return navigateTo('dashboard');
          content.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
          try {
            const groups = await fetch('/api/admin/groups', { headers }).then(r => r.json());
            const allGoals = await fetch('/api/admin/goals', { headers }).then(r => r.json());
            content.innerHTML = renderGroups(groups, allGoals);
          } catch (e) {
            content.innerHTML = '<div class="empty-state"><p>Error loading groups</p></div>';
          }
          break;
          
        case 'team-report':
          if (currentUser.role !== 'MANAGER' && currentUser.role !== 'ADMIN') return navigateTo('dashboard');
          content.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
          try {
            const managers = await fetch('/api/admin/managers', { headers }).then(r => r.json());
            const employees = await fetch('/api/admin/employees', { headers }).then(r => r.json());
            content.innerHTML = renderTeamReportFilters(managers, employees);
          } catch (e) {
            content.innerHTML = '<div class="empty-state"><p>Error loading filters</p></div>';
          }
          break;
          
        // MANAGER VIEWS
        case 'manager-team':
          if (currentUser.role !== 'MANAGER') return navigateTo('dashboard');
          const team = await fetch('/api/manager/team', { headers }).then(r => r.json());
          const teamGoals = await fetch('/api/manager/team-goals', { headers }).then(r => r.json());
          content.innerHTML = renderManagerTeam(team, teamGoals);
          break;
          
        case 'manager-goals':
          if (currentUser.role !== 'MANAGER') return navigateTo('dashboard');
          const teamMembers = await fetch('/api/manager/team', { headers }).then(r => r.json());
          const teamGoalsList = await fetch('/api/manager/team-goals', { headers }).then(r => r.json());
          const customGoals = await fetch('/api/manager/custom-goals', { headers }).then(r => r.json());
          content.innerHTML = renderManagerGoals(teamMembers, teamGoalsList, customGoals);
          break;
          
        // EMPLOYEE VIEWS
        case 'my-goals': {
          const isManagerGoals = currentUser.role === 'MANAGER';
          const goalsEndpoint = isManagerGoals ? '/api/manager/my-goals' : '/api/employee/goals';
          const myGoals = await fetch(goalsEndpoint, { headers }).then(r => r.json());
          content.innerHTML = renderMyGoals(myGoals, token);
          break;
        }

        case 'my-ratings': {
          const isManagerRatings = currentUser.role === 'MANAGER';
          const ratingsEndpoint = isManagerRatings ? '/api/manager/my-ratings' : '/api/employee/ratings';
          const ratings = await fetch(ratingsEndpoint, { headers }).then(r => r.json());
          content.innerHTML = renderMyRatings(ratings);
          break;
        }

        case 'life-events':
          const lifeEvents = await fetch('/api/employee/life-events', { headers }).then(r => r.json());
          const pendingApprovals = currentUser.role === 'MANAGER' ? await fetch('/api/manager/pending-life-events', { headers }).then(r => r.json()) : [];
          content.innerHTML = renderLifeEvents(lifeEvents, pendingApprovals);
          break;
      }
    }

    // ============ DASHBOARD FUNCTIONS ============

    async function renderDashboard() {
      const token = localStorage.getItem('token');
      const headers = { 'Authorization': `Bearer ${token}` };
      
      if (currentUser.role === 'ADMIN') {
        // Organization insights
        const stats = await fetch('/api/admin/stats', { headers }).then(r => r.json());
        const html = renderAdminDashboard(stats);
        setTimeout(() => initAdminCharts(stats), 0);
        return html;
      } else if (currentUser.role === 'MANAGER') {
        // Team insights
        const stats = await fetch('/api/manager/stats', { headers }).then(r => r.json());
        const pendingLifeEvents = await fetch('/api/manager/pending-life-events', { headers }).then(r => r.json()).catch(() => []);
        const pendingWeightageChanges = await fetch('/api/manager/pending-weightage-changes', { headers }).then(r => r.json()).catch(() => []);
        const teamGoals = await fetch('/api/manager/team-goals', { headers }).then(r => r.json()).catch(() => []);
        const team = await fetch('/api/manager/team', { headers }).then(r => r.json()).catch(() => []);
        
        const html = renderManagerDashboard(stats);
        // After rendering, load the actions section and charts
        setTimeout(() => {
          loadActionsRequiredSection(pendingLifeEvents, pendingWeightageChanges, teamGoals, team);
          initManagerCharts(stats, teamGoals);
        }, 0);
        return html;
      } else {
        // Employee insights
        const stats = await fetch('/api/employee/stats', { headers }).then(r => r.json());
        const lifeEvents = await fetch('/api/employee/life-events', { headers }).then(r => r.json()).catch(() => []);
        const goals = await fetch('/api/employee/goals', { headers }).then(r => r.json()).catch(() => []);
        
        const html = renderEmployeeDashboard(stats, lifeEvents);
        // After rendering, load the requests section and charts
        setTimeout(() => {
          loadMyRequestsSection(lifeEvents);
          initEmployeeCharts(stats, goals);
        }, 0);
        return html;
      }
    }

    function renderAdminDashboard(stats) {
      return `
        <div class="stats-grid">
          <div class="stat-card" data-card-type="employees" onclick="navigateTo('users')">
            <div class="stat-value">${stats.totalEmployees || 0}</div>
            <div class="stat-label">Total Employees</div>
          </div>
          <div class="stat-card" data-card-type="managers" onclick="navigateTo('users')">
            <div class="stat-value">${stats.totalManagers || 0}</div>
            <div class="stat-label">Managers</div>
          </div>
          <div class="stat-card" data-card-type="goals" onclick="navigateTo('goals')">
            <div class="stat-value">${stats.activeGoals || 0}</div>
            <div class="stat-label">Active Goals</div>
          </div>
          <div class="stat-card" data-card-type="completed" onclick="navigateTo('goals')">
            <div class="stat-value">${stats.completedGoals || 0}</div>
            <div class="stat-label">Completed Goals</div>
          </div>
        </div>
        
        <div class="charts-grid" id="admin-charts">
          <div class="chart-container">
            <h3 class="chart-title">Goals Overview</h3>
            <div class="donut-chart-container">
              <canvas id="goalsOverviewChart"></canvas>
            </div>
          </div>
          <div class="chart-container">
            <h3 class="chart-title">Completion Rate by Department</h3>
            <div class="chart-wrapper">
              <canvas id="departmentComparisonChart"></canvas>
            </div>
          </div>
        </div>
        
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">Organization Insights</h3>
          </div>
          <div class="insight-grid">
            <div class="insight-item">
              <h4>Goal Completion Rate</h4>
              <p>${stats.completionRate || 0}%</p>
              <small>Across all employees</small>
            </div>
            <div class="insight-item">
              <h4>Top Performing Department</h4>
              <p class="success">${stats.topDepartment || 'N/A'}</p>
              <small>Highest completion rate</small>
            </div>
            <div class="insight-item">
              <h4>Needs Attention</h4>
              <p class="warning">${stats.needsAttention || 0}</p>
              <small>Employees below 40%</small>
            </div>
            <div class="insight-item">
              <h4>Active Rating Period</h4>
              <p class="muted">${stats.activePeriod || 'None'}</p>
              <small>Currently in progress</small>
            </div>
          </div>
        </div>
      `;
    }

    function renderManagerDashboard(stats) {
      return `
        <div class="stats-grid">
          <div class="stat-card" data-card-type="team-members" onclick="navigateTo('manager-team')">
            <div class="stat-value">${stats.teamMembers || 0}</div>
            <div class="stat-label">Team Members</div>
          </div>
          <div class="stat-card" data-card-type="active-goals" onclick="navigateTo('manager-goals')">
            <div class="stat-value">${stats.activeGoals || 0}</div>
            <div class="stat-label">Active Goals</div>
          </div>
          <div class="stat-card" data-card-type="completed-goals" onclick="navigateTo('manager-goals')">
            <div class="stat-value">${stats.completedGoals || 0}</div>
            <div class="stat-label">Completed Goals</div>
          </div>
          <div class="stat-card" data-card-type="pending-approvals" onclick="filterByPendingApprovals()">
            <div class="stat-value">${stats.pendingApprovals || 0}</div>
            <div class="stat-label">Pending Approvals</div>
          </div>
        </div>
        
        <div class="charts-grid" id="manager-charts">
          <div class="chart-container">
            <h3 class="chart-title">Team Performance Distribution</h3>
            <div class="donut-chart-container">
              <canvas id="teamPerformanceChart"></canvas>
            </div>
          </div>
          <div class="chart-container">
            <h3 class="chart-title">Goals Progress Overview</h3>
            <div class="chart-wrapper">
              <canvas id="goalsProgressChart"></canvas>
            </div>
          </div>
        </div>
        
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">Team Insights</h3>
          </div>
          <div class="insight-grid">
            <div class="insight-item">
              <h4>Team Completion Rate</h4>
              <p>${stats.completionRate || 0}%</p>
              <small>Average across team</small>
            </div>
            <div class="insight-item">
              <h4>Goals On Track</h4>
              <p class="success">${stats.onTrack || 0}</p>
              <small>70% or more complete</small>
            </div>
            <div class="insight-item">
              <h4>Needs Improvement</h4>
              <p class="warning">${stats.needsImprovement || 0}</p>
              <small>Below 40% complete</small>
            </div>
            <div class="insight-item">
              <h4>Completed This Period</h4>
              <p class="success">${stats.completedThisPeriod || 0}</p>
              <small>Goals marked complete</small>
            </div>
          </div>
        </div>
        <div id="actions-required-section"></div>
      `;
    }

    function renderEmployeeDashboard(stats, lifeEvents = []) {
      return `
        <div class="stats-grid">
          <div class="stat-card" data-card-type="goals" onclick="navigateTo('my-goals')">
            <div class="stat-value">${stats.activeGoals || 0}</div>
            <div class="stat-label">Active Goals</div>
          </div>
          <div class="stat-card" data-card-type="completed" onclick="navigateTo('my-goals')">
            <div class="stat-value">${stats.completedGoals || 0}</div>
            <div class="stat-label">Completed Goals</div>
          </div>
          <div class="stat-card" data-card-type="completion" onclick="navigateTo('my-goals')">
            <div class="stat-value">${stats.avgCompletion || 0}%</div>
            <div class="stat-label">Avg. Completion</div>
          </div>
          <div class="stat-card" data-card-type="pending" onclick="navigateTo('life-events')">
            <div class="stat-value">${stats.pendingApprovals || 0}</div>
            <div class="stat-label">Pending Approvals</div>
          </div>
        </div>
        
        <div class="charts-grid" id="employee-charts">
          <div class="chart-container">
            <h3 class="chart-title">Goals by Category</h3>
            <div class="radar-chart-container">
              <canvas id="goalsRadarChart"></canvas>
            </div>
          </div>
          <div class="chart-container">
            <h3 class="chart-title">Goal Progress</h3>
            <div class="goal-progress-bars" id="goalProgressBars">
              <!-- Dynamically populated -->
            </div>
          </div>
        </div>
        
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">My Performance Insights</h3>
          </div>
          <div class="insight-grid">
            <div class="insight-item">
              <h4>Focus Priority</h4>
              <p>${stats.focusPriority || 'N/A'}</p>
              <small>Based on goal weightage</small>
            </div>
            <div class="insight-item">

    function loadActionsRequiredSection(pendingLifeEvents, pendingWeightageChanges, teamGoals, team) {
      const section = document.getElementById('actions-required-section');
      if (!section) return;
      
      // Calculate goals approaching deadline (within 7 days)
      const now = new Date();
      const sevenDaysFromNow = new Date(now.getTime() + 7 * 24 * 60 * 60 * 1000);
      const approachingDeadline = teamGoals.filter(tg => {
        if (!tg.due_date) return false;
        const dueDate = new Date(tg.due_date);
        return dueDate >= now && dueDate <= sevenDaysFromNow && (tg.latest_completion || 0) < 100;
      });
      
      // Calculate overdue progress updates (no update in 2 weeks)
      const twoWeeksAgo = new Date(now.getTime() - 14 * 24 * 60 * 60 * 1000);
      const overdueUpdates = teamGoals.filter(tg => {
        if (!tg.last_updated) return false;
        const lastUpdated = new Date(tg.last_updated);
        return lastUpdated < twoWeeksAgo && (tg.latest_completion || 0) < 100;
      });
      
      // Get unique employees with overdue updates
      const uniqueOverdueEmployees = [...new Set(overdueUpdates.map(tg => tg.employee_id))];
      
      const hasActions = pendingLifeEvents.length > 0 || pendingWeightageChanges.length > 0 || 
                        approachingDeadline.length > 0 || uniqueOverdueEmployees.length > 0;
      
      if (!hasActions) {
        section.innerHTML = '';
        return;
      }
      
      section.innerHTML = `
        <div class="card actions-required-card">
          <div class="card-header">
            <h3 class="card-title">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>

          ${pendingLifeEvents.length > 0 ? `

                Pending Life Events

              <div class="action-list">
                ${pendingLifeEvents.map(le => `

                    <div class="action-content">
                      <strong>${le.employee_name}</strong>
                      <span>${le.event_type} - ${le.description || 'No description'}</span>
                      <small>Submitted: ${le.created_at || 'Unknown'}</small>
                    </div>

                      <button class="btn btn-sm btn-success" onclick="approveLifeEvent('${le.id}')">Approve</button>
                      <button class="btn btn-sm btn-danger" onclick="rejectLifeEvent('${le.id}')">Reject</button>
                    </div>
                  </div>

              </div>
            </div>
          ` : ''}
          
          ${pendingWeightageChanges.length > 0 ? `
            <div class="action-section">
              <h4 class="action-title">
                <span class="badge badge-warning">${pendingWeightageChanges.length}</span>
                Pending Weightage Changes
              </h4>
              <div class="action-list">
                ${pendingWeightageChanges.map(wc => `
                  <div class="action-item">
                    <div class="action-content">
                      <strong>${wc.employee_name}</strong>
                      <span>Goal: ${wc.goal_title}</span>
                      <small>Old Weightage: ${wc.old_weightage}% → New Weightage: ${wc.new_weightage}%</small>
                    </div>
                    <div class="action-buttons">
                      <button class="btn btn-sm btn-success" onclick="approveWeightageChange('${wc.id}')">Approve</button>
                      <button class="btn btn-sm btn-danger" onclick="rejectWeightageChange('${wc.id}')">Reject</button>
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>
          ` : ''}
          
          ${approachingDeadline.length > 0 ? `
            <div class="action-section">
              <h4 class="action-title">
                <span class="badge badge-danger">${approachingDeadline.length}</span>
                Goals Approaching Deadline (7 days)
              </h4>
              <div class="action-list">
                ${approachingDeadline.map(ad => `

    function filterRequests(status, tabElement) {
      // Update tabs
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tabElement.classList.add('active');
      
      // Filter requests
      const items = document.querySelectorAll('.request-item');
      items.forEach(item => {
        if (status === 'all') {
          item.style.display = 'flex';
        } else {
          item.style.display = item.dataset.status === status.toUpperCase() ? 'flex' : 'none';
        }
      });
    }

    // Action handlers for manager
    async function approveLifeEvent(id) {
      const token = localStorage.getItem('token');
      const response = await fetch(`/api/manager/life-events/${id}/approve`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` }
      });

      if (response.ok) {
        alert('Life event approved!');
        navigateTo('life-events');
      } else {
        const err = await response.json();
        alert('Failed to approve: ' + err.error);
      }
    }

    async function rejectLifeEvent(id) {
      const reason = prompt('Please provide a reason for rejection:');
      if (!reason) return;

      const token = localStorage.getItem('token');
      const response = await fetch(`/api/manager/life-events/${id}/reject`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ reason })
      });

      if (response.ok) {
        alert('Life event rejected!');
        navigateTo('life-events');
      } else {
        const err = await response.json();
        alert('Failed to reject: ' + err.error);
      }
    }

    async function approveWeightageChange(id) {
      try {
        const token = localStorage.getItem('token');
        const response = await fetch(`/api/manager/goal-weightage/${id}/approve`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }
        });
        if (response.ok) {
          alert('Weightage change approved');
          navigateTo('dashboard');
        } else {
          const err = await response.json();
          alert('Failed to approve: ' + err.error);
        }
      } catch (e) {
        alert('Error approving weightage change');
      }
    }

    async function rejectWeightageChange(id) {
      const reason = prompt('Enter rejection reason:');
      if (!reason) return;
      try {
        const token = localStorage.getItem('token');
        const response = await fetch(`/api/manager/goal-weightage/${id}/reject`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ reason })
        });
        if (response.ok) {
          alert('Weightage change rejected');
          navigateTo('dashboard');
        }
      } catch (e) {
        alert('Error rejecting weightage change');
      }
    }

      const radarCtx = document.getElementById('goalsRadarChart');
      if (radarCtx && goals && goals.length > 0) {
        const categories = {};
        goals.forEach(g => {
          const cat = g.category || 'General';
          if (!categories[cat]) categories[cat] = [];
          categories[cat].push(g.latest_completion || 0);
        });
        
        const categoryLabels = Object.keys(categories);
        const categoryData = categoryLabels.map(cat => {
          const completions = categories[cat];
          return completions.reduce((a, b) => a + b, 0) / completions.length;
        });
        
        new Chart(radarCtx, {
          type: 'radar',
          data: {
            labels: categoryLabels.length > 0 ? categoryLabels : ['Goals'],
            datasets: [{
              label: 'Completion %',

              backgroundColor: 'rgba(59, 130, 246, 0.2)',

    async function loadTeamReport() {
      const token = localStorage.getItem('token');
      const managerId = document.getElementById('report-manager')?.value || '';
      const employeeId = document.getElementById('report-employee')?.value || '';
      const periodId = document.getElementById('report-period')?.value || '';
      
      const params = new URLSearchParams();
      if (managerId) params.append('managerId', managerId);
      if (employeeId) params.append('employeeId', employeeId);
      if (periodId) params.append('periodId', periodId);
      
      const content = document.getElementById('team-report-content');
      content.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
      
      try {
        const report = await fetch(`/api/reports/team?${params}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        }).then(r => r.json());
        
        content.innerHTML = renderTeamReportData(report);
      } catch (e) {
        content.innerHTML = '<div class="empty-state"><p>Error loading report</p></div>';
      }
    }

    function renderTeamReportData(report) {
      if (!report || !report.summary) return '<div class="empty-state"><p>No data available for selected filters</p></div>';
      
      return `
        <div style="background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%); padding: 20px; border-radius: 12px; margin-bottom: 20px;">
          <h4 style="margin-bottom: 10px;">📊 Organization Summary</h4>
          <p>${report.summary.employeeCount || 0} employees across ${report.summary.managerCount || 0} managers</p>
          <p>Average completion: ${report.summary.avgCompletion || 0}%</p>

        ${report.byManager && report.byManager.length > 0 ? `
          <h4 style="margin-bottom: 15px;">By Manager</h4>
          ${report.byManager.map(m => `
            <div style="margin-bottom: 20px; padding: 15px; background: var(--background); border-radius: 8px; cursor: pointer;" onclick="toggleSection('manager-${m.id}')">
              <div class="flex justify-between items-center">
                <strong>${m.name} (${m.employeeCount} employees)</strong>
                <span class="badge ${m.avgCompletion >= 70 ? 'badge-success' : m.avgCompletion >= 40 ? 'badge-warning' : 'badge-danger'}">
                  ${m.avgCompletion}% avg
                </span>
              </div>
              <div id="manager-${m.id}" style="display: none; margin-top: 15px;">
                ${m.employees.map(e => `
                  <div style="padding: 10px; margin-top: 10px; border-left: 3px solid var(--primary);">

    // ============ EMPLOYEE RENDER FUNCTIONS ============

    function renderMyGoals(goals, token) {
      // Sort: needs attention first (below 40%), then on track (40-69%), then going well (70%+), then completed
      const needsAttention = goals.filter(g => (g.latest_completion || 0) < 40 && g.status !== 'COMPLETED');
      const onTrack = goals.filter(g => (g.latest_completion || 0) >= 40 && (g.latest_completion || 0) < 70 && g.status !== 'COMPLETED');
      const goingWell = goals.filter(g => (g.latest_completion || 0) >= 70 && (g.latest_completion || 0) < 100 && g.status !== 'COMPLETED');
      const completed = goals.filter(g => (g.latest_completion || 0) >= 100 || g.status === 'COMPLETED');
      
      return `
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">My Goals</h3>
          </div>
          
          ${goals.length === 0 ? '<div class="empty-state"><p>No goals assigned yet</p></div>' : `
            <!-- Needs Attention Section -->
            ${needsAttention.length > 0 ? `
              <div style="margin-bottom: 25px;">
                <h4 style="margin-bottom: 15px; color: var(--warning);">⚠️ Needs Attention (${needsAttention.length})</h4>
                ${needsAttention.map(g => renderGoalCard(g, token)).join('')}
              </div>
            ` : ''}
            
            <!-- On Track Section -->
            ${onTrack.length > 0 ? `
              <div style="margin-bottom: 25px;">
                <h4 style="margin-bottom: 15px; color: var(--success);">🌟 On Track (${onTrack.length})</h4>
                ${onTrack.map(g => renderGoalCard(g, token)).join('')}
              </div>
            ` : ''}
            
            <!-- Going Well Section -->
            ${goingWell.length > 0 ? `
              <div style="margin-bottom: 25px;">
                <h4 style="margin-bottom: 15px; color: var(--primary);">📈 Going Well (${goingWell.length})</h4>
                ${goingWell.map(g => renderGoalCard(g, token)).join('')}
              </div>
            ` : ''}
            
            <!-- Completed Section -->
            ${completed.length > 0 ? `
              <div style="margin-bottom: 25px;">
                <h4 style="margin-bottom: 15px; color: var(--text-secondary);">✅ Completed (${completed.length})</h4>
                ${completed.map(g => renderGoalCard(g, token)).join('')}
              </div>
            ` : ''}
          `}
        </div>
      `;
    }

    function renderGoalCard(g, token) {
      const completion = g.latest_completion || 0;
      const statusClass = completion >= 70 ? 'success' : completion >= 40 ? 'warning' : 'danger';
      const isCustom = g.is_custom === 1 || g.is_custom === true;
      const needsWeightageApproval = g.weightage_pending_approval === 1 || g.weightage_pending_approval === true;
      
      return `
        <div style="margin-bottom: 20px; padding: 20px; background: var(--background); border-radius: 12px; border-left: 4px solid var(--${statusClass});">
          <div class="flex justify-between items-center mb-2">
            <div>
              <h4>
                ${g.customized_title || g.title}
                ${isCustom ? '<span class="badge badge-info" style="margin-left: 8px;">Custom</span>' : ''}
                ${needsWeightageApproval ? '<span class="badge badge-warning" style="margin-left: 8px;">Pending Approval</span>' : ''}
              </h4>
              <p style="color: var(--text-secondary); font-size: 14px; margin-top: 5px;">${g.description || g.customized_criteria || ''}</p>
              ${g.weightage ? `<p style="font-size: 13px; margin-top: 5px;"><strong>Weightage:</strong> ${g.weightage}%</p>` : ''}
            </div>
            <span class="badge badge-${statusClass}">${completion}%</span>
          </div>
          
          <div class="progress-bar mb-3">
            <div class="progress-fill ${statusClass}" style="width: ${Math.min(completion, 100)}%"></div>
          </div>
          
          <div style="display: flex; gap: 10px; flex-wrap: wrap;">
            <button class="btn btn-primary btn-sm" onclick="showUpdateProgressModal('${g.id}', '${escapeHtml(g.customized_title || g.title)}')">
              Update Progress
            </button>
            <button class="btn btn-secondary btn-sm" onclick="showUploadFileModal('${g.id}', '${escapeHtml(g.customized_title || g.title)}')">
              📎 Upload File
            </button>
            ${g.files && g.files.length > 0 ? `
              <button class="btn btn-secondary btn-sm" onclick="showViewFilesModal('${g.id}', '${escapeHtml(g.customized_title || g.title)}')">
                View Files (${g.files.length})
              </button>
            ` : ''}
            <button class="btn btn-secondary btn-sm" onclick="showUpdateWeightageModal('${g.id}', '${escapeHtml(g.customized_title || g.title)}', ${g.weightage || 0})">
              Update Weightage
            </button>
          </div>
          
          ${g.manager_feedback ? `
            <div style="margin-top: 15px; padding: 12px; background: rgba(0,0,0,0.05); border-radius: 8px;">
              <strong>Manager Feedback:</strong>
              <p style="font-size: 13px; margin-top: 5px;">${g.manager_feedback}</p>
            </div>
          ` : ''}
        </div>
      `;
    }

    function renderMyRatings(ratings) {

        return `

    function renderLifeEvents(lifeEvents, pendingApprovals) {
      const isManager = currentUser.role === 'MANAGER';
      
      let html = '';
      
      // Show pending approvals for manager
      if (isManager && pendingApprovals && pendingApprovals.length > 0) {
        html += `
          <div class="card" style="border-left: 4px solid var(--warning);">
            <div class="card-header">
              <h3 class="card-title">⏳ Pending Approvals</h3>
            </div>
            ${pendingApprovals.map(le => `
              <div style="margin-bottom: 15px; padding: 15px; background: var(--background); border-radius: 8px;">
                <div class="flex justify-between items-center">
                  <div>
                    <strong>${le.employee_name}</strong>
                    <p style="color: var(--text-secondary); font-size: 14px;">${formatEventType(le.event_type)} - ${le.start_date} to ${le.end_date}</p>
                    <p style="font-size: 13px; margin-top: 5px;">${le.reason || ''}</p>
                  </div>
                  <div style="display: flex; gap: 10px;">
                    <button class="btn btn-success btn-sm" onclick="approveLifeEvent('${le.id}')">Approve</button>
                    <button class="btn btn-danger btn-sm" onclick="rejectLifeEvent('${le.id}')">Reject</button>
                  </div>
                </div>
              </div>
            `).join('')}
          </div>
        `;
      }
      
      // Show employee's own life events
      html += `
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">My Life Events</h3>
            ${!isManager ? '<button class="btn btn-primary btn-sm" onclick="showAddLifeEventModal()">+ Add Life Event</button>' : ''}
          </div>
          <p style="color: var(--text-secondary); margin-bottom: 15px;">
            ${!isManager ? 'Add life events that may have affected your performance (e.g., dependent\'s death, medical leave, sabbatical). Manager approval required.' : 'Life events submitted by your team members.'}
          </p>
          ${lifeEvents.length === 0 ? '<div class="empty-state"><p>No life events recorded</p></div>' : `
            ${lifeEvents.map(le => `
              <div style="margin-bottom: 15px; padding: 15px; background: var(--background); border-radius: 8px; border-left: 4px solid ${le.status === 'APPROVED' ? 'var(--success)' : le.status === 'PENDING' ? 'var(--warning)' : 'var(--danger)'};">
                <div class="flex justify-between items-center">
                  <div>
                    <h4>${formatEventType(le.event_type)}</h4>
                    <p style="color: var(--text-secondary); font-size: 14px;">
                      ${le.start_date} to ${le.end_date}
                    </p>
                    <p style="font-size: 13px; margin-top: 5px;">${le.reason || ''}</p>
                    ${le.adjustment_percentage ? `<p style="font-size: 13px; color: var(--primary);">Rating Adjustment: ${le.adjustment_percentage}%</p>` : ''}
                  </div>
                  <div>
                    <span class="badge badge-${le.status === 'APPROVED' ? 'success' : le.status === 'PENDING' ? 'warning' : 'danger'}">${le.status}</span>
                    ${!isManager && le.status === 'PENDING' ? `
                      <button class="btn btn-sm btn-secondary" style="margin-left: 10px;" onclick="showEditLifeEventModal('${le.id}', '${le.event_type}', '${le.start_date}', '${le.end_date}', '${le.reason || ''}')"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
                      <button class="btn btn-sm btn-danger" onclick="deleteLifeEvent('${le.id}')"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg></button>
                    ` : ''}
                  </div>

    // File Upload Modal
    function showUploadFileModal(goalId, goalTitle) {
      document.getElementById('modal-title').textContent = `Upload File - ${goalTitle}`;
      document.getElementById('modal-content').innerHTML = `
        <form onsubmit="uploadFile(event, '${goalId}')">
          <div class="form-group">
            <label class="form-label">File</label>
            <input type="file" name="file" class="form-input" required>
          </div>
          <div class="form-group">
            <label class="form-label">Description</label>
            <textarea name="description" class="form-textarea" placeholder="What is this file about?"></textarea>

          <button type="submit" class="btn btn-primary" style="width: 100%;">Upload</button>
        </form>
      `;
      document.getElementById('modal-overlay').classList.add('active');
    }

    async function uploadFile(e, goalId) {
      e.preventDefault();
      const form = e.target;
      const fileInput = form.file;
      const description = form.description.value;

      if (!fileInput.files.length) {
        alert('Please select a file');
        return;
      }

      const fileName = fileInput.files[0].name;

      const token = localStorage.getItem('token');
      const response = await fetch(`/api/employee/goals/${goalId}/files`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ file_name: fileName, description })
      });

      if (response.ok) {
        closeModal();
        alert('File reference saved successfully!');
        navigateTo('my-goals');
      } else {
        const err = await response.json();
        alert('Failed to save file: ' + err.error);
      }
    }

    async function showViewFilesModal(goalId, goalTitle) {
      const token = localStorage.getItem('token');
      const files = await fetch(`/api/employee/goals/${goalId}/files`, {
        headers: { 'Authorization': `Bearer ${token}` }
      }).then(r => r.json()).catch(() => []);

      document.getElementById('modal-title').textContent = `Files - ${goalTitle}`;
      document.getElementById('modal-content').innerHTML = `
        ${files.length === 0 ? '<p style="color: var(--text-secondary);">No files uploaded yet.</p>' : `
          <div style="max-height: 300px; overflow-y: auto;">
            ${files.map(f => `
              <div style="padding: 12px; margin-bottom: 8px; background: var(--background); border-radius: 8px; display: flex; justify-content: space-between; align-items: center;">
                <div>
                  <strong>${f.file_name}</strong>
                  ${f.description ? `<p style="font-size: 13px; color: var(--text-secondary); margin-top: 4px;">${f.description}</p>` : ''}
                  <p style="font-size: 12px; color: var(--text-secondary);">Uploaded: ${new Date(f.uploaded_at).toLocaleDateString()}</p>
                </div>
              </div>
            `).join('')}
          </div>
        `}
      `;
      document.getElementById('modal-overlay').classList.add('active');
    }

    async function showAssignGoalModal(employeeId, employeeName) {
      const token = localStorage.getItem('token');
      const goals = await fetch('/api/admin/goals', { headers: { 'Authorization': `Bearer ${token}` } }).then(r => r.json()).catch(() => []);

      document.getElementById('modal-title').textContent = `Assign Goal to ${employeeName}`;
      document.getElementById('modal-content').innerHTML = `
        <form onsubmit="assignGoalToEmployee(event, '${employeeId}')">
          <div class="form-group">
            <label class="form-label">Select Goal</label>
            <select name="goalId" class="form-select" required>
              <option value="">Choose a goal...</option>
              ${goals.map(g => `<option value="${g.id}">${g.title}</option>`).join('')}
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Customized Title (Optional)</label>
            <input type="text" name="customizedTitle" class="form-input" placeholder="Override goal title for this employee">
          </div>
          <div class="form-group">
            <label class="form-label">Customized Criteria (Optional)</label>
            <textarea name="customizedCriteria" class="form-textarea" placeholder="Override success criteria"></textarea>
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%;">Assign Goal</button>
        </form>
      `;
      document.getElementById('modal-overlay').classList.add('active');
    }

    async function assignGoalToEmployee(e, employeeId) {
      e.preventDefault();
      const form = e.target;
      const data = {
        employeeId,
        goalId: form.goalId.value,
        customizedTitle: form.customizedTitle.value || null,
        customizedCriteria: form.customizedCriteria.value || null
      };

      const token = localStorage.getItem('token');
      const response = await fetch('/api/manager/assign-goal', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify(data)
      });

      if (response.ok) {
        closeModal();
        alert('Goal assigned successfully!');
        navigateTo('manager-team');
      } else {
        const err = await response.json();
        alert('Failed to assign goal: ' + err.error);
      }
    }

    function formatEventType(type) {
      const map = {
        'SICK_LEAVE': 'Medical Leave',
        'MATERNITY_LEAVE': 'Maternity Leave',
        'PATERNITY_LEAVE': 'Paternity Leave',
        'BEREAVEMENT': 'Bereavement',
        'SABBATICAL': 'Sabbatical',
        'FAMILY_EMERGENCY': 'Family Emergency',
        'PERSONAL_EMERGENCY': 'Personal Emergency',
        'OTHER': 'Other'
      };
      return map[type] || type;
    }

    function toggleGoalDetails() {
      document.querySelectorAll('.goal-header').forEach(th => {
        th.style.writingMode = th.style.writingMode === 'vertical-rl' ? 'horizontal-tb' : 'vertical-rl';
      });
    }

    function logout() {
      localStorage.removeItem('token');
      currentUser = null;
      document.getElementById('app').classList.add('hidden');
      document.getElementById('auth-container').classList.remove('hidden');
    }
